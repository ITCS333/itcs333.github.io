<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ITCS333 Code Editor</title>

  <!-- CodeMirror 5 core -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.css" />

  <!-- Themes -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/theme/dracula.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/theme/monokai.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/theme/material.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/theme/nord.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/theme/solarized.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/theme/github.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/theme/eclipse.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/theme/mdn-like.min.css" />

  <!-- CodeMirror JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/edit/closetag.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/edit/closebrackets.min.js"></script>

  <!-- LZString compression -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1e1f29;
      --surface:   #282a36;
      --border:    #44475a;
      --accent:    #bd93f9;
      --accent2:   #50fa7b;
      --accent3:   #ff79c6;
      --text:      #f8f8f2;
      --muted:     #6272a4;
      --tab-h:     42px;
      --toolbar-h: 52px;
    }

    html { height: 100%; }

    body {
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      max-width: 100vw;
    }

    /* ── Toolbar ──────────────────────────────────────────── */
    #toolbar {
      height: var(--toolbar-h);
      min-height: var(--toolbar-h);
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      overflow: hidden;
      min-width: 0;
      width: 100%;
    }

    #toolbar h1 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      flex: 1 1 auto;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar-btn {
      flex-shrink: 0;
      background: var(--border);
      color: var(--text);
      border: none;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .toolbar-btn:hover    { background: var(--muted); }
    .toolbar-btn.run      { background: var(--accent2); color: #1e1f29; font-weight: 700; }
    .toolbar-btn.run:hover { filter: brightness(1.1); }
    .toolbar-btn.loading  { opacity: 0.6; cursor: wait; }

    #theme-select {
      flex-shrink: 0;
      background: var(--border);
      color: var(--text);
      border: none;
      border-radius: 6px;
      padding: 5px 6px;
      font-size: 0.82rem;
      cursor: pointer;
      outline: none;
      max-width: 130px;
    }
    #theme-select:focus { outline: 2px solid var(--accent); }

    .theme-label {
      flex-shrink: 0;
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── App ──────────────────────────────────────────────── */
    #app {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Tab bar ──────────────────────────────────────────── */
    #tab-bar {
      flex-shrink: 0;
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      width: 100%;
    }

    .tab-btn {
      flex: 1;
      height: var(--tab-h);
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tab-btn:hover  { color: var(--text); background: rgba(255,255,255,0.04); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: rgba(189,147,249,0.08);
    }

    /* ── Panels container ─────────────────────────────────── */
    #panels {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* ── Drag divider ─────────────────────────────────────── */
    #divider {
      width: 5px;
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.15s;
      display: none; /* shown only on desktop via media query */
    }
    #divider:hover,
    #divider.dragging { background: var(--accent); }

    /* ── Panel label ──────────────────────────────────────── */
    .panel-label {
      flex-shrink: 0;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 5px 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    /* ── CodeMirror wrapper ───────────────────────────────── */
    .cm-wrap {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .cm-wrap .CodeMirror {
      flex: 1;
      height: 100% !important;
      font-size: 0.9rem;
      line-height: 1.6;
      font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    }

    /* ── Editor panels ────────────────────────────────────── */
    .editor-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Preview panel ────────────────────────────────────── */
    #preview-panel {
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    #preview-frame {
      flex: 1;
      border: none;
      width: 100%;
      min-height: 0;
      background: #fff;
    }

    /* ── Toast ────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent2);
      color: #1e1f29;
      padding: 8px 20px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.85rem;
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      pointer-events: none;
      z-index: 999;
      text-align: center;
      max-width: calc(100vw - 32px);
      white-space: pre-line;
    }
    #toast.show  { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.error { background: var(--accent3); }

    /* ══════════════════════════════════════════════════════
       MOBILE (default — < 768px)
       All panels are absolutely positioned to fill #panels.
       Only the active tab's panel is visible.
    ══════════════════════════════════════════════════════ */
    #editor-column { display: contents; }

    .editor-panel,
    #preview-panel {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .editor-panel.hidden,
    #preview-panel.hidden { display: none; }

    /* ══════════════════════════════════════════════════════
       DESKTOP (≥ 768px)
       Left column: tabbed editor panes (HTML/CSS/JS tabs).
       Right column: always-visible preview split.
       Preview tab button is hidden on desktop.
    ══════════════════════════════════════════════════════ */
    @media (min-width: 768px) {

      /* Hide the "Preview" tab button — preview is always visible */
      .tab-btn[data-target="preview-panel"] { display: none; }

      /* Left editor column: fixed 50% width, flex column */
      #editor-column {
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        width: 50%;
        min-height: 0;
        overflow: hidden;
        position: relative; /* establishes stacking context for abs children */
      }

      /* All three editor panels stack inside the column.
         They're absolutely positioned so each fills the full
         column height — only the active one is shown. */
      .editor-panel {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: flex !important; /* override .hidden's display:none below */
      }
      .editor-panel.hidden { display: none !important; }

      /* Preview panel: right-hand split, static in the flex row */
      #preview-panel {
        position: static;
        inset: auto;
        flex: 1;
        min-width: 0;
        height: auto;
        display: flex !important;
      }

      /* Drag divider visible on desktop */
      #divider { display: block; }

      /* Theme label visible on desktop */
      .theme-label { display: inline; }
    }

    @media (max-width: 480px) {
      .theme-label { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Toolbar ─────────────────────────────────────────────── -->
<div id="toolbar">
  <h1>🌐 ITCS333 Editor</h1>
  <button class="toolbar-btn run" id="btn-run">▶ Run</button>
  <button class="toolbar-btn" id="btn-share">⎘ Share</button>
  <button class="toolbar-btn" id="btn-clear">✕ Clear</button>
  <span class="theme-label">Theme:</span>
  <select id="theme-select" title="Editor theme">
    <optgroup label="Dark">
      <option value="dracula">Dracula</option>
      <option value="monokai">Monokai</option>
      <option value="material">Material</option>
      <option value="nord">Nord</option>
      <option value="solarized dark">Solarized Dark</option>
    </optgroup>
    <optgroup label="Light">
      <option value="default">Default (Light)</option>
      <option value="solarized light">Solarized Light</option>
      <option value="github">GitHub</option>
      <option value="eclipse">Eclipse</option>
      <option value="mdn-like">MDN-like</option>
    </optgroup>
  </select>
</div>

<!-- ── App ────────────────────────────────────────────────── -->
<div id="app">

  <div id="tab-bar">
    <button class="tab-btn active" data-target="html-panel">HTML</button>
    <button class="tab-btn"        data-target="css-panel">CSS</button>
    <button class="tab-btn"        data-target="js-panel">JS</button>
    <!-- Hidden on desktop via CSS; visible on mobile -->
    <button class="tab-btn"        data-target="preview-panel">Preview</button>
  </div>

  <div id="panels">

    <!-- Left: tabbed editor column -->
    <div id="editor-column">
      <div class="editor-panel" id="html-panel">
        <div class="panel-label">HTML</div>
        <div class="cm-wrap" id="html-cm-wrap"></div>
      </div>
      <div class="editor-panel hidden" id="css-panel">
        <div class="panel-label">CSS</div>
        <div class="cm-wrap" id="css-cm-wrap"></div>
      </div>
      <div class="editor-panel hidden" id="js-panel">
        <div class="panel-label">JS</div>
        <div class="cm-wrap" id="js-cm-wrap"></div>
      </div>
    </div>

    <!-- Drag divider (desktop only) -->
    <div id="divider"></div>

    <!-- Right: preview (always visible on desktop, tab on mobile) -->
    <div id="preview-panel" class="hidden">
      <div class="panel-label">Preview</div>
      <iframe id="preview-frame" sandbox="allow-scripts allow-modals"></iframe>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   1.  DEFAULTS
═══════════════════════════════════════════════════════════ */
const DEFAULT = {
  html: `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Page</title>
</head>
<body>
  <h1>Hello, World!</h1>
  <p>Edit the code on the left and click <strong>Run</strong>.</p>
</body>
</html>`,
  css: `/* Your CSS here */
body {
  font-family: system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  margin: 0;
  background: #f0f4ff;
  color: #1a1a2e;
}
h1 { color: #6c63ff; }`,
  js: `// Your JavaScript here\nconsole.log('Hello from the editor!');`
};

/* ═══════════════════════════════════════════════════════════
   2.  ENCODE / DECODE
═══════════════════════════════════════════════════════════ */
function encodeState(obj) {
  return LZString.compressToEncodedURIComponent(JSON.stringify(obj));
}
function decodeState(encoded) {
  try {
    const json = LZString.decompressFromEncodedURIComponent(encoded);
    if (json) return JSON.parse(json);
  } catch (_) {}
  try { return JSON.parse(decodeURIComponent(escape(atob(encoded)))); } catch (_) {}
  return null;
}

/* ═══════════════════════════════════════════════════════════
   3.  BUILD SHARE URL
═══════════════════════════════════════════════════════════ */
function buildLongURL() {
  const encoded = encodeState({
    html:  htmlEditor.getValue(),
    css:   cssEditor.getValue(),
    js:    jsEditor.getValue(),
    theme: document.getElementById('theme-select').value,
  });
  const url = new URL(window.location.href);
  url.search = '';
  url.searchParams.set('code', encoded);
  return url.toString();
}

/* ═══════════════════════════════════════════════════════════
   4.  URL SHORTENER
═══════════════════════════════════════════════════════════ */
async function shortenURL(longURL) {
  const res = await fetch(
    `https://is.gd/create.php?format=json&url=${encodeURIComponent(longURL)}`
  );
  if (!res.ok) throw new Error(`is.gd ${res.status}`);
  const data = await res.json();
  if (!data.shorturl) throw new Error('No shorturl in response');
  return data.shorturl;
}

/* ═══════════════════════════════════════════════════════════
   5.  URL PRELOAD
═══════════════════════════════════════════════════════════ */
function loadFromURL() {
  try {
    const encoded = new URLSearchParams(window.location.search).get('code');
    return encoded ? decodeState(encoded) : null;
  } catch (e) { return null; }
}

const preloaded    = loadFromURL();
const savedTheme   = localStorage.getItem('cm-theme') ?? 'dracula';
const initialTheme = preloaded?.theme ?? savedTheme;

const initial = {
  html:  preloaded?.html  ?? DEFAULT.html,
  css:   preloaded?.css   ?? DEFAULT.css,
  js:    preloaded?.js    ?? DEFAULT.js,
  theme: initialTheme,
};

/* ═══════════════════════════════════════════════════════════
   6.  CODEMIRROR INSTANCES
═══════════════════════════════════════════════════════════ */
const cmOpts = (mode) => ({
  mode,
  theme: initial.theme,
  lineNumbers: true,
  autoCloseTags: true,
  autoCloseBrackets: true,
  indentUnit: 2,
  tabSize: 2,
  indentWithTabs: false,
  lineWrapping: false,
});

const htmlEditor = CodeMirror(document.getElementById('html-cm-wrap'), { ...cmOpts('htmlmixed'),  value: initial.html });
const cssEditor  = CodeMirror(document.getElementById('css-cm-wrap'),  { ...cmOpts('css'),        value: initial.css  });
const jsEditor   = CodeMirror(document.getElementById('js-cm-wrap'),   { ...cmOpts('javascript'), value: initial.js   });

document.getElementById('theme-select').value = initial.theme;

/* ═══════════════════════════════════════════════════════════
   7.  THEME
═══════════════════════════════════════════════════════════ */
function setTheme(theme) {
  [htmlEditor, cssEditor, jsEditor].forEach(ed => ed.setOption('theme', theme));
  localStorage.setItem('cm-theme', theme);
  document.getElementById('theme-select').value = theme;
}
document.getElementById('theme-select')
  .addEventListener('change', e => setTheme(e.target.value));

/* ═══════════════════════════════════════════════════════════
   8.  RUN / PREVIEW
═══════════════════════════════════════════════════════════ */
function buildDocument() {
  const html = htmlEditor.getValue();
  const css  = cssEditor.getValue();
  const js   = jsEditor.getValue();
  const full = /<!doctype/i.test(html) || /<html/i.test(html);

  if (full) {
    let doc = html;
    const s = `<style>${css}</style>`;
    const j = `<script>${js}<\/script>`;
    doc = /<\/head>/i.test(doc) ? doc.replace(/<\/head>/i, `${s}\n</head>`) : s + '\n' + doc;
    doc = /<\/body>/i.test(doc) ? doc.replace(/<\/body>/i, `${j}\n</body>`) : doc + '\n' + j;
    return doc;
  }
  return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<style>${css}</style></head><body>${html}<script>${js}<\/script></body></html>`;
}

function runPreview() {
  document.getElementById('preview-frame').srcdoc = buildDocument();
}

window.addEventListener('load', () => {
  runPreview();
  setTimeout(() => {
    htmlEditor.refresh();
    cssEditor.refresh();
    jsEditor.refresh();
  }, 50);
});
document.getElementById('btn-run').addEventListener('click', runPreview);

/* ═══════════════════════════════════════════════════════════
   9.  SHARE
═══════════════════════════════════════════════════════════ */
const shareBtn = document.getElementById('btn-share');

shareBtn.addEventListener('click', async () => {
  const longURL = buildLongURL();
  shareBtn.textContent = '⏳ Sharing…';
  shareBtn.classList.add('loading');
  shareBtn.disabled = true;

  let finalURL = longURL, usedShortener = false;
  try {
    finalURL = await shortenURL(longURL);
    usedShortener = true;
  } catch (err) { console.warn('Shortener failed:', err); }

  try {
    await navigator.clipboard.writeText(finalURL);
    showToast(usedShortener
      ? `Short link copied! 🎉\n${finalURL}`
      : 'Link copied! (shortener unavailable) 🎉');
  } catch (_) { showToast(`Copy this link:\n${finalURL}`, 6000); }

  shareBtn.textContent = '⎘ Share';
  shareBtn.classList.remove('loading');
  shareBtn.disabled = false;
});

/* ═══════════════════════════════════════════════════════════
   10.  CLEAR
═══════════════════════════════════════════════════════════ */
document.getElementById('btn-clear').addEventListener('click', () => {
  if (!confirm('Clear all editors?')) return;
  htmlEditor.setValue('');
  cssEditor.setValue('');
  jsEditor.setValue('');
  runPreview();
});

/* ═══════════════════════════════════════════════════════════
   11.  TABS
   On mobile: all 4 tabs work, panels are abs-positioned.
   On desktop: only HTML/CSS/JS tabs are shown; clicking them
   swaps which editor-panel is visible inside the left column.
   The preview panel is always shown on desktop regardless.
═══════════════════════════════════════════════════════════ */
const tabBtns      = document.querySelectorAll('.tab-btn');
const editorPanels = ['html-panel', 'css-panel', 'js-panel']
                       .map(id => document.getElementById(id));
const previewPanel = document.getElementById('preview-panel');

const editorMap = {
  'html-panel': htmlEditor,
  'css-panel':  cssEditor,
  'js-panel':   jsEditor,
};

const desktopMQ = window.matchMedia('(min-width: 768px)');

function switchTab(targetId) {
  const isDesktop = desktopMQ.matches;

  // Update active tab button highlight
  tabBtns.forEach(b =>
    b.classList.toggle('active', b.dataset.target === targetId)
  );

  if (isDesktop) {
    // Desktop: toggle editor panels inside the left column.
    // Preview is always visible — never touched here.
    editorPanels.forEach(p =>
      p.classList.toggle('hidden', p.id !== targetId)
    );
  } else {
    // Mobile: all panels (including preview) compete for the same slot.
    [...editorPanels, previewPanel].forEach(p =>
      p.classList.toggle('hidden', p.id !== targetId)
    );
  }

  const ed = editorMap[targetId];
  if (ed) setTimeout(() => ed.refresh(), 0);
}

tabBtns.forEach(btn =>
  btn.addEventListener('click', () => switchTab(btn.dataset.target))
);

/* ═══════════════════════════════════════════════════════════
   12.  BREAKPOINT WATCHER
   When crossing the 768px boundary, fix up panel visibility
   so nothing is left in a broken hidden/shown state.
═══════════════════════════════════════════════════════════ */
function onBreakpointChange(e) {
  const activeTarget = document.querySelector('.tab-btn.active')?.dataset.target
                       ?? 'html-panel';

  if (e.matches) {
    // Switched to desktop:
    // - Show the currently active editor panel, hide others.
    // - Always show preview.
    editorPanels.forEach(p =>
      p.classList.toggle('hidden', p.id !== activeTarget)
    );
    previewPanel.classList.remove('hidden');
  } else {
    // Switched to mobile: only the active tab's panel is visible.
    [...editorPanels, previewPanel].forEach(p =>
      p.classList.toggle('hidden', p.id !== activeTarget)
    );
    // If the active tab was "preview-panel" on mobile that's fine;
    // if not, make sure preview is hidden on mobile by default.
  }

  setTimeout(() => {
    htmlEditor.refresh();
    cssEditor.refresh();
    jsEditor.refresh();
  }, 50);
}

desktopMQ.addEventListener('change', onBreakpointChange);
// Run once on load to set up the correct initial state.
onBreakpointChange(desktopMQ);

/* ═══════════════════════════════════════════════════════════
   13.  DRAG DIVIDER  (desktop only)
═══════════════════════════════════════════════════════════ */
const divider      = document.getElementById('divider');
const editorColumn = document.getElementById('editor-column');
const panelsEl     = document.getElementById('panels');
let isDragging     = false;

divider.addEventListener('mousedown', e => {
  isDragging = true;
  divider.classList.add('dragging');
  document.body.style.cursor     = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const rect = panelsEl.getBoundingClientRect();
  const pct  = Math.min(Math.max(
    (e.clientX - rect.left) / rect.width * 100, 20), 80);
  editorColumn.style.width = pct + '%';
});
document.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  divider.classList.remove('dragging');
  document.body.style.cursor = document.body.style.userSelect = '';
  htmlEditor.refresh();
  cssEditor.refresh();
  jsEditor.refresh();
});

/* ═══════════════════════════════════════════════════════════
   14.  TOAST
═══════════════════════════════════════════════════════════ */
let toastTimer = null;
function showToast(msg, duration = 3000) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
}
</script>
